name: Dependency Audit

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: jdx/mise-action@f10502fc09dadecfefb962fff68ce77213930204 # v4.2.2
        with:
          experimental: true
        env:
          MISE_PYTHON_COMPILE: '0'

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: backend-go/go.mod
          cache-dependency-path: backend-go/go.sum

      - name: Install frontend dependencies
        run: npm ci

      - name: Report outdated npm packages
        run: npm outdated >> "$GITHUB_STEP_SUMMARY" || true

      - name: Report outdated Go modules
        working-directory: backend-go
        run: go list -m -u all >> "$GITHUB_STEP_SUMMARY" || true

      - name: Install govulncheck
        continue-on-error: true
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Scan Go modules
        continue-on-error: true
        working-directory: backend-go
        run: govulncheck ./... >> "$GITHUB_STEP_SUMMARY" || true
