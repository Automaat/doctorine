name: Dependency Audit

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          experimental: true
        env:
          MISE_PYTHON_COMPILE: '0'

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: backend-go/go.mod
          cache-dependency-path: backend-go/go.sum

      - name: Install frontend dependencies
        run: npm ci

      - name: Report outdated npm packages
        run: npm outdated >> "$GITHUB_STEP_SUMMARY" || true

      - name: Report outdated Go modules
        working-directory: backend-go
        run: go list -m -u all >> "$GITHUB_STEP_SUMMARY" || true

      - name: Install govulncheck
        continue-on-error: true
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Scan Go modules
        continue-on-error: true
        working-directory: backend-go
        run: govulncheck ./... >> "$GITHUB_STEP_SUMMARY" || true
