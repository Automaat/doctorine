name: Release

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.2.3) - empty = auto-bump minor from last tag'
        required: false
        type: string

permissions:
  contents: write
  packages: write

jobs:
  check:
    runs-on: ubuntu-24.04
    outputs:
      should_release: ${{ steps.gate.outputs.should_release }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Determine whether to release
        id: gate
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Manual run; releasing."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            echo "No release tag yet; releasing."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COUNT=$(git rev-list --count "$LATEST..HEAD")
          echo "$COUNT commit(s) on main since $LATEST"
          if [ "$COUNT" -gt 0 ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "No new commits since $LATEST; skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Compute version
        run: |
          INPUT="${{ inputs.version }}"
          INPUT="${INPUT#v}"

          if [ -n "$INPUT" ]; then
            VERSION="$INPUT"
          else
            LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
            if [ -z "$LATEST" ]; then
              VERSION="0.1.0"
            else
              LATEST="${LATEST#v}"
              IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
              VERSION="$MAJOR.$((MINOR + 1)).0"
            fi
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Tag and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v$VERSION"
          git push origin "v$VERSION"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
          if [ -n "$PREV" ]; then
            NOTES=$(git log --oneline "$PREV..HEAD")
          else
            NOTES=$(git log --oneline)
          fi

          gh release create "v$VERSION" --title "v$VERSION" --notes "$NOTES"

      - name: Log in to ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and push frontend
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: |
            ghcr.io/automaat/doctorine-frontend:latest
            ghcr.io/automaat/doctorine-frontend:v${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend-go
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./backend-go
          push: true
          tags: |
            ghcr.io/automaat/doctorine-backend-go:latest
            ghcr.io/automaat/doctorine-backend-go:v${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
