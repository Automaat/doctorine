[tools]
node = "24"
go = "1.26.4"
"go:github.com/golangci/golangci-lint/v2/cmd/golangci-lint" = "2.12.2"

[tasks.dev]
description = "Start all services for development"
run = "docker-compose -f docker-compose.dev.yml up --build"

[tasks.down]
description = "Stop all services"
run = "docker-compose -f docker-compose.dev.yml down"

[tasks.backend]
description = "Start backend API only"
run = "cd backend-go && go run ./cmd/api"

[tasks.frontend]
description = "Start frontend only"
run = "npm run dev"
